<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5A0"/>
      <stop offset="100%" style="stop-color:#00B4D8"/>
    </linearGradient>
    <linearGradient id="barGrad1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.85"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- Subtle inner glow -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

  <!-- Bar chart bars -->
  <!-- Bar 1 (shortest) -->
  <rect x="118" y="298" width="52" height="104" rx="10" ry="10" fill="url(#barGrad2)"/>
  
  <!-- Bar 2 (medium) -->
  <rect x="194" y="228" width="52" height="174" rx="10" ry="10" fill="url(#barGrad1)"/>
  
  <!-- Bar 3 (tallest) -->
  <rect x="270" y="168" width="52" height="234" rx="10" ry="10" fill="url(#barGrad1)"/>

  <!-- AI sparkle / brain element - stylized star burst -->
  <g transform="translate(368, 158)">
    <!-- Main 4-point star -->
    <path d="M0,-48 C4,-16 16,-4 48,0 C16,4 4,16 0,48 C-4,16 -16,4 -48,0 C-16,-4 -4,-16 0,-48Z" fill="url(#sparkGrad)"/>
    <!-- Small accent star -->
    <path d="M32,-52 C33,-44 36,-41 44,-40 C36,-39 33,-36 32,-28 C31,-36 28,-39 20,-40 C28,-41 31,-44 32,-52Z" fill="white" opacity="0.7"/>
  </g>

  <!-- Trend line connecting bars -->
  <path d="M144,290 Q170,260 220,220 Q260,190 296,160" 
        fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-opacity="0.4"
        stroke-dasharray="8,8"/>

</svg>
